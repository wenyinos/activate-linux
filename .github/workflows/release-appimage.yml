name: Release AppImage

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  appimage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcairo2-dev libpango1.0-dev \
            libxi-dev libx11-dev x11proto-core-dev x11proto-dev \
            libxt-dev libxext-dev libxfixes-dev libxinerama-dev libxrandr-dev \
            libwayland-dev wayland-protocols libconfig-dev

      - name: Build
        run: make

      - name: Build AppImage
        run: make appimage

      - name: Upload AppImage to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            activate-linux-x86_64.AppImage \
            --clobber
